<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>windlab.dev</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f7f5f2;
      color: #1a1a18;
      font-family: Georgia, serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 1.5rem;
    }

    img {
      width: 100%;
      max-width: 680px;
      height: auto;
      display: block;
    }

    p {
      margin-top: 2.5rem;
      font-size: 1.4rem;
      font-weight: 300;
      letter-spacing: 0.01em;
      color: #2c2c2a;
    }

    .links {
      display: flex;
      gap: 2rem;
      margin-top: 2rem;
    }

    .links a {
      font-family: Georgia, serif;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      text-transform: lowercase;
      color: #8a8880;
      text-decoration: none;
      border-bottom: 1px solid #8a8880;
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }

    .links a:hover {
      color: #1a1a18;
      border-color: #1a1a18;
    }
  </style>
</head>
<body>
  <img src="image1.jpg" alt="windlab" />
  <p>welcome to nothing</p>
  <div class="links">
    <a href="https://www.instagram.com/nullvoid.qx/">instagram</a>
    <a href="mailto:windlost@tuta.com">email</a>
    <a href="https://github.com/Windnoise00">github</a>
  </div>
</body>
</html>
